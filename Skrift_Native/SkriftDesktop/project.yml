name: SkriftDesktop
options:
  bundleIdPrefix: com.skrift
  deploymentTarget:
    # 15.0 since 2026-07-16: the CoreML-LLM package (shared GemmaEmbedder for the
    # Connections panel) declares macOS 15 as its floor. Was 14.0.
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  # Pinned to the exact commit the June-2026 builds verified — same pin as the
  # iOS app (one engine, two apps); upgrade both together, deliberately.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    revision: 19600a485baa4998812e4654b70d2bab8f2c9949  # v0.15.5, bumped 2026-07-21 (📖 spike 3: #683 seam-glue fixes in 0.15.3+0.15.5; was 7f963cdc = v0.15.2)
  # 📖 ePub extraction (spike 4): an .epub is a zip; no system unzip API. Approved as
  # SPM dep #2 (Tuur 2026-07-21). MIT, zero transitive deps. Desktop-only until the
  # phone's attach-ePub UX lands (spike 6). Revision = the 0.9.20 tag.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    revision: 86fc841708997c5bce8545e23845125f4eb28493  # 0.9.20, pinned 2026-07-21
  # mlx-swift LLM stack for enhancement (gemma4 registered on main). 3.x decoupled
  # the downloader/tokenizer → swift-huggingface + swift-transformers integrations.
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    revision: a47894a1e7e963b24bd48c030f5fc1d1627e60e9  # pinned 2026-07-19 (was branch: main — upstream broke fresh checkouts vs resolved mlx-swift); the revision every green build ran
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.9.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    # Pinned 2026-07-13 (was from: "1.3.0" — floating): a fresh regenerate resolved
    # 1.3.3, whose Hub/Config.swift doesn't compile against this project's Swift 5.9
    # (ObjectKey dictionary-key error) → full-scheme build red. Package.resolved lives
    # in the gitignored .xcodeproj, so ONLY exact pins are reproducible here.
    exactVersion: "1.3.0"
  # TRANSITIVE pin: transformers' Config.swift breaks against Jinja 2.4.0's ObjectKey
  # API change, and transformers only demands jinja ≥2.0 — this top-level reference
  # forces the resolver to the last compatible tag. Drop when transformers is bumped
  # to a Jinja-2.4-aware release.
  swift-jinja:
    url: https://github.com/huggingface/swift-jinja.git
    exactVersion: "2.3.6"
  # EmbeddingGemma-300M on the ANE (Connections panel / P8) — same pin as the iOS
  # app (one engine, two apps; its swift-transformers ≥1.0 range accepts our 1.3.0 pin).
  CoreMLLLM:
    url: https://github.com/john-rocky/CoreML-LLM
    from: "1.9.0"

targets:
  SkriftDesktop:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Pipeline
      - path: Engines
      - path: Features
      # Shared cross-app source (one physical copy → no phone↔Mac drift).
      # Model: the shared CloudKit @Models (Memo, MemoAsset, MemoEnhancement) + DeviceID,
      # so the Mac can be a CloudKit client of the phone's note store (MAC_CLOUDKIT_PLAN.md).
      # Pipeline: pure parity algorithms both apps must run identically (vocab
      # parsing/trust, fusion, voice match, BPE merge, image markers).
      - path: ../Shared/Naming
      - path: ../Shared/Export
      - path: ../Shared/Model
      - path: ../Shared/Pipeline
      # Session: the shared LockGate (per-device unlock state for locked notes).
      - path: ../Shared/Session
      # UI: shared SwiftUI helpers (FlowLayout — one copy across both apps + the extension).
      - path: ../Shared/UI
      # Retrieval: the P8 embedding index core (EmbeddingIndex/Store/MemoEmbedding +
      # engine seam + gist) — one copy; powers the Connections panel (mocks/related-panel.html).
      - path: ../Shared/Retrieval
      # RetrievalEngine: the CoreML-LLM-bound GemmaEmbedder — APP target only,
      # never the test bundles (tests use MockEmbedder; the package link stays out).
      - path: ../Shared/RetrievalEngine
    settings:
      base:
        PRODUCT_NAME: SkriftDesktop
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        # App icon from App/Assets.xcassets (macOS squircle, full size set).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Team signing — REQUIRED for CloudKit (the Mac joins the phone's private DB to read
        # synced memos + write enhancements back; MAC_CLOUDKIT_PLAN.md). NOT sandboxed on
        # purpose (the app reads the Obsidian vault + arbitrary audio paths); CloudKit works in
        # a non-sandboxed dev/Developer-ID-signed Mac app. The iCloud CloudKit container is
        # declared per-config in the .entitlements below; registering it on the App ID is a
        # one-time manual Xcode "Signing & Capabilities" visit (the CLI can't add a capability).
        # The host-less UnitTests bundle keeps its OWN ad-hoc signing, so the fast MLX-free
        # test loop still runs without a provisioning profile.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9W82X49JZS
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        # Dev/prod separation. Debug = "Skrift Dev" (com.skrift.desktop.dev) → its own
        # ~/Library/Application Support/Skrift Dev/ + SwiftData store + defaults to the
        # TEST vault (AppPaths/SettingsStore #if DEBUG), so dev runs never touch the
        # production data or the real Obsidian vault. Release = the real "Skrift".
        # PRODUCT_NAME drives CFBundleName (the macOS app-menu / menu-bar name) AND the
        # .app filename — the reliable lever (INFOPLIST_KEY_CFBundleName is dropped by the
        # plist generator, so the menu bar fell back to "SkriftDesktop" for both). Now dev
        # vs prod are unmistakable everywhere: "Skrift Dev" vs "Skrift".
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.desktop.dev
          PRODUCT_NAME: Skrift Dev
          INFOPLIST_KEY_CFBundleDisplayName: Skrift Dev
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev   # inverted-color dev icon
          CODE_SIGN_ENTITLEMENTS: SkriftDesktop.dev.entitlements
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.desktop
          PRODUCT_NAME: Skrift
          INFOPLIST_KEY_CFBundleDisplayName: Skrift
          CODE_SIGN_ENTITLEMENTS: SkriftDesktop.entitlements
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: CoreMLLLM
        product: CoreMLLLM

  # Host-less logic test bundle — proves `xcodebuild test` runs the unit harness.
  # Host-less logic tests: macOS hosted tests flakily hang on the testmanagerd
  # control session, so we compile the pure-logic sources straight into the test
  # bundle instead of @testable-importing the app. Keep FluidAudio/mlx-using files
  # OUT of here (they belong to integration/manual verification).
  SkriftDesktopTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SkriftDesktopTests
      - path: Models
      - path: Pipeline
      # Shared cross-app source (host-less test bundle compiles it directly, like Models/Pipeline).
      - path: ../Shared/Naming
      - path: ../Shared/Export
      - path: ../Shared/Model
      - path: ../Shared/Pipeline
      - path: ../Shared/Retrieval
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.desktop.unittests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO

  SkriftDesktopUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: SkriftDesktopUITests
    dependencies:
      - target: SkriftDesktop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.desktop.uitests
        TEST_TARGET_NAME: SkriftDesktop
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO

schemes:
  SkriftDesktop:
    build:
      targets:
        SkriftDesktop: all
        SkriftDesktopTests: [test]
        SkriftDesktopUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SkriftDesktopTests
        - SkriftDesktopUITests

  # Fast loop: builds + runs ONLY the host-less logic tests (no app target, so no
  # FluidAudio/MLX compile). Use `-scheme UnitTests` for the routine test cycle.
  UnitTests:
    build:
      targets:
        SkriftDesktopTests: [test]
    test:
      config: Debug
      targets:
        - SkriftDesktopTests
