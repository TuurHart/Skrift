name: SkriftMobile
options:
  bundleIdPrefix: com.skrift
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  # Match Shhhcribble's pin (branch: main) so diarization/boosting APIs line up
  # with what was verified there — NOT the RN app's exactVersion 0.12.4.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
  # Live mic waveform (wired to the AVAudioEngine meters — no 2nd audio session).
  DSWaveformImage:
    url: https://github.com/dmrschmidt/DSWaveformImage.git
    from: "14.0.0"
  # Tasteful transitions, used sparingly.
  Pow:
    url: https://github.com/EmergeTools/Pow.git
    from: "1.0.0"

# Signing: bake the dev team into the project so `xcodegen generate` never drops it.
# Without this, every regeneration reset DEVELOPMENT_TEAM to None and the app + its
# extensions (SkriftWidget/SkriftShare) needed manual re-signing in Xcode each time.
# Top-level → applies to ALL targets + BOTH configs (the dev/prod bundle-id + App
# Group + entitlement split stays per-config in each target below).
settings:
  base:
    DEVELOPMENT_TEAM: 9W82X49JZS

targets:
  SkriftMobile:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Features
      - path: DesignSystem
      # Shared cross-app source (one physical copy → no phone↔Mac drift). Naming
      # types (Person/NamesMerge/NamesData) live here; engine + more land in Phase 0.
      # Export adds the shared Compiler + neutral CompilerInput DTO (standalone Phase 2).
      # Model adds the shared CloudKit @Models the Mac also adopts (MemoEnhancement; later
      # Memo/MemoAsset) — the Mac→CloudKit write-back (MAC_CLOUDKIT_PLAN.md).
      - path: ../Shared/Naming
      - path: ../Shared/Export
      - path: ../Shared/Model
    info:
      path: App/Info.plist
      properties:
        # Resolved per-config (SKRIFT_DISPLAY_NAME): "Skrift Dev" in Debug, "Skrift"
        # in Release — so the dev + prod apps are distinguishable on the home screen.
        CFBundleDisplayName: $(SKRIFT_DISPLAY_NAME)
        # App Group id, readable at runtime (CaptureInbox) — same key as the share
        # extension's Info.plist, so both processes resolve the identical container.
        SkriftAppGroup: $(SKRIFT_APP_GROUP)
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "38"
        # Skrift is offline + uses only standard iOS crypto (on-device ASR, plain
        # local-network HTTP) → exempt from export compliance. Declaring this skips
        # the "Missing Compliance" prompt on every TestFlight/App Store build.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Skrift records audio to transcribe your speech. Recording only happens when you trigger it."
        NSCameraUsageDescription: "Skrift lets you snap photos while recording, placed into the transcript at the moment you took them."
        NSFaceIDUsageDescription: "Skrift uses Face ID to open your locked notes."
        NSLocationWhenInUseUsageDescription: "Skrift tags each memo with where you recorded it (place name, daylight, weather)."
        NSMotionUsageDescription: "Skrift records your step count alongside a memo for context."
        NSLocalNetworkUsageDescription: "Skrift finds your Mac on the local network to sync memos and names."
        NSBonjourServices:
          - _skrift._tcp
        # The Mac server is plain HTTP on the LAN; iOS blocks cleartext by
        # default. NSAllowsLocalNetworking permits it for local/.local/Bonjour
        # hosts only (no global ATS disable). Without this the upload/health/
        # names requests never leave the phone.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.skrift.mobile
            CFBundleURLSchemes:
              - skrift
        # Live Activity (recording status on Lock Screen / Dynamic Island).
        NSSupportsLiveActivities: true
        # Keep the audio session + recording alive when backgrounded/locked so
        # the Live Activity stays meaningful.
        UIBackgroundModes:
          - audio
          - processing          # BGProcessingTask: continue a whole-book transcribe overnight
          - remote-notification # CloudKit silent push → sync in seconds, even backgrounded
        # Whole-book transcription can resume in the background (best overnight on a
        # charger). App-internal id (not the bundle id) so it's identical Debug/Release.
        BGTaskSchedulerPermittedIdentifiers:
          - com.skrift.booktranscribe
        # Share-to-import: appear in the Share Sheet / "Open in" for audio files
        # (WhatsApp / Voice Memos exports → a Skrift memo). iOS routes the file
        # URL through .onOpenURL → AppURLHandler → MemoSaver.importAudio.
        # LSHandlerRank=Alternate so we don't fight the OS default audio app.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Audio
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - public.mp3
              - public.mpeg-4-audio
              - com.microsoft.waveform-audio
              - public.aiff-audio
              # Broaden coverage — some apps (e.g. Signal) export voice notes with
              # a UTI that doesn't conform to public.audio (.opus / .aac / .m4a /
              # mp4-container). A true Share Extension is the robust catch-all
              # (lands with capture items); these add the common concrete types.
              - public.aac-audio
              - com.apple.m4a-audio
              - org.xiph.opus
              - public.mpeg-4
          # Share/Open-in a VIDEO (e.g. a self-recorded clip): Skrift strips the
          # audio + grabs one frame thumbnail, then transcribes on-device
          # (AppURLHandler → MemoSaver.importVideo). Alternate rank so we don't
          # fight the OS default video app.
          - CFBundleTypeName: Video
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.movie
              - public.video
              - public.mpeg-4
              - com.apple.quicktime-movie
        LSSupportsOpeningDocumentsInPlace: true
        # Photos picker (filtered to videos) reads a library asset's recording date.
        NSPhotoLibraryUsageDescription: "Skrift imports a video you pick, transcribing its audio and tagging the memo with when the video was recorded."
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        # App icon from App/Assets.xcassets (light + dark iOS-18 adaptive variants).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Dev/prod separation. Debug = "Skrift Dev" (com.skrift.mobile.dev) — its OWN
        # OS data container, so dev iteration NEVER touches the production app's
        # memos/recordings. Release = the real "Skrift". The widget + shared framework
        # bundle IDs follow (an app-extension id must be prefixed by its host's).
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev
          SKRIFT_DISPLAY_NAME: Skrift Dev
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev   # inverted-color dev icon
          # App Group: Debug resolves to the .dev group; Release to the prod group.
          # This single variable drives both the entitlement and the Info.plist key
          # (SkriftAppGroup) in both the app and the share extension — one place to flip.
          SKRIFT_APP_GROUP: group.com.skrift.mobile.dev
          # Literal per-config entitlements: a $(VAR) inside the .entitlements file
          # broke CLI automatic provisioning (profile matcher can't resolve it).
          CODE_SIGN_ENTITLEMENTS: App/SkriftMobile.dev.entitlements
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile
          SKRIFT_DISPLAY_NAME: Skrift
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
          SKRIFT_APP_GROUP: group.com.skrift.mobile
          CODE_SIGN_ENTITLEMENTS: App/SkriftMobile.entitlements
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: DSWaveformImage
        product: DSWaveformImageViews
      - package: Pow
        product: Pow
      - target: SkriftShared
        embed: true
      - target: SkriftWidget
        embed: true
      - target: SkriftShare
        embed: true

  # Shared framework: Live Activity ActivityAttributes (and, in 8b, the App
  # Intents) — visible to both the app and the widget extension.
  SkriftShared:
    type: framework
    platform: iOS
    sources:
      - path: SkriftShared
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "28"
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev.shared
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.shared

  # WidgetKit extension: the recording Live Activity (8a); Control Center +
  # Home/Lock widgets land in 8b.
  SkriftWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SkriftWidget
      # Multi-target source membership (Apple's iOS-18 pattern): the widget
      # compiles its own copy of the intents it triggers (Control Center Start,
      # Live Activity Stop). They reference only their static performer, so they
      # build here; the app sets the performer and openAppWhenRun routes the run
      # into the app process. SkriftShortcuts stays app-only (AppShortcutsProvider).
      - path: App/Intents/StartRecordingIntent.swift
      - path: App/Intents/StopRecordingIntent.swift
    info:
      path: SkriftWidget/Info.plist
      properties:
        CFBundleDisplayName: Skrift
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "38"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev.widget
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.widget
    dependencies:
      - target: SkriftShared
        embed: false

  # Share extension: save a URL / text / image into Skrift from any app.
  # The UI is hosted in a UIHostingController (ShareViewController.swift).
  # NO heavy package dependencies — the extension has a 120 MB memory ceiling;
  # FluidAudio/DSWaveformImage/Pow are deliberately excluded.
  SkriftShare:
    type: app-extension
    platform: iOS
    sources:
      - path: SkriftShare
      # Multi-target source membership: CaptureInbox is shared between the app
      # and the extension (both write/read the App Group container).
      - path: Services/Capture/CaptureInbox.swift
      # SignificanceCircles + its dependencies (SignificanceScale in the same
      # file, DesignSystem colors) are compiled directly into the extension so
      # it can render the significance control without importing the app target.
      - path: Features/MemoDetail/SignificanceCircles.swift
      # DesignSystem (Theme colours, Components) — no UIKit/AppKit-only API here,
      # so it builds cleanly in the extension process.
      - path: DesignSystem/Theme.swift
      - path: DesignSystem/Components.swift
      - path: DesignSystem/Haptics.swift
      - path: DesignSystem/FlowLayout.swift
      # SharedContent + MemoMetadata types used by the share UI and CaptureInbox.
      - path: Models/MemoMetadata.swift
      # ISO8601 formatter (same UTC/fractional-seconds format as the Mac contract).
      - path: Services/ISO8601.swift
    info:
      path: SkriftShare/Info.plist
      properties:
        CFBundleDisplayName: Skrift
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "38"
        SkriftAppGroup: $(SKRIFT_APP_GROUP)
        # Dictation in the share sheet: the extension RECORDS a voice note (the
        # main app transcribes it on drain — Parakeet can't fit the extension's
        # memory ceiling). The usage key must live in the EXTENSION bundle.
        NSMicrophoneUsageDescription: Skrift records your spoken thoughts about what you're sharing and transcribes them on-device.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          # The activation rule MUST sit under NSExtensionAttributes — as a direct
          # NSExtension child iOS finds no rule and the extension never appears in
          # any share sheet (2026-06-12 device finding). No WebPageWithMaxCount
          # (implies a JS preprocessing file we don't ship; the URL item suffices).
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsImageWithMaxCount: 1
              NSExtensionActivationSupportsMovieWithMaxCount: 1
              # PDF/document share (2026-06-21) — xcodegen GENERATES this plist from
              # project.yml, so the activation rule MUST live here (a direct edit to
              # SkriftShare/Info.plist is clobbered on the next `xcodegen generate`).
              NSExtensionActivationSupportsFileWithMaxCount: 1
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev.share
          SKRIFT_APP_GROUP: group.com.skrift.mobile.dev
          CODE_SIGN_ENTITLEMENTS: SkriftShare/SkriftShare.dev.entitlements
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.share
          SKRIFT_APP_GROUP: group.com.skrift.mobile
          CODE_SIGN_ENTITLEMENTS: SkriftShare/SkriftShare.entitlements

  SkriftMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkriftMobileTests
    dependencies:
      - target: SkriftMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.unittests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

  SkriftMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SkriftMobileUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.uitests
        TEST_TARGET_NAME: SkriftMobile
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: SkriftMobile

schemes:
  SkriftMobile:
    build:
      targets:
        SkriftShared: all
        SkriftWidget: all
        SkriftShare: all
        SkriftMobile: all
        SkriftMobileTests: [test]
        SkriftMobileUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SkriftMobileTests
        - SkriftMobileUITests
