name: SkriftMobile
options:
  bundleIdPrefix: com.skrift
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  # Pinned to the exact commit the June-2026 device builds verified (upgrade
  # deliberately, with a device round — never float a branch).
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    revision: 19600a485baa4998812e4654b70d2bab8f2c9949  # v0.15.5, bumped 2026-07-21 (📖 spike 3: #683 seam-glue fixes in 0.15.3+0.15.5; was 7f963cdc = v0.15.2)
  # 📖 ePub attach (spike 6): an .epub is a zip; no system unzip API. Same pin as the
  # desktop (SPM dep #2, Tuur-approved 2026-07-21). App target ONLY — extensions and
  # test bundles never touch archives.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    revision: 86fc841708997c5bce8545e23845125f4eb28493  # 0.9.20, pinned 2026-07-21
  # Live mic waveform (wired to the AVAudioEngine meters — no 2nd audio session).
  DSWaveformImage:
    url: https://github.com/dmrschmidt/DSWaveformImage.git
    from: "14.0.0"
  # Tasteful transitions, used sparingly.
  Pow:
    url: https://github.com/EmergeTools/Pow.git
    from: "1.0.0"
  # EmbeddingGemma-300M on the ANE (P8 retrieval index). Engine choice decided by
  # the 2026-07-07 bake-off (spikes/EmbeddingBakeoff): 10/10 vs Apple NL's 5/10.
  CoreMLLLM:
    url: https://github.com/john-rocky/CoreML-LLM
    from: "1.9.0"
  # ✨ Polish on the iPad (wave 1, 2026-07-22): the Mac's exact enhancement stack,
  # pin-for-pin (mlx-swift-lm + the decoupled downloader/tokenizer + the transitive
  # jinja fix — see SkriftDesktop/project.yml for each pin's story). APP TARGET
  # ONLY — never the extensions (120 MB ceiling) or test bundles. Runtime is
  # gated to capable iPads (PolishCenter); iPhones carry the code inert.
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    revision: a47894a1e7e963b24bd48c030f5fc1d1627e60e9  # same pin as the desktop (2026-07-19)
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.9.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    exactVersion: "1.3.0"   # desktop pin 2026-07-13 (1.3.3 breaks Swift 5.9)
  swift-jinja:
    url: https://github.com/huggingface/swift-jinja.git
    exactVersion: "2.3.6"   # transitive pin: transformers Config vs Jinja 2.4 ObjectKey

# Signing: bake the dev team into the project so `xcodegen generate` never drops it.
# Without this, every regeneration reset DEVELOPMENT_TEAM to None and the app + its
# extensions (SkriftWidget/SkriftShare) needed manual re-signing in Xcode each time.
# Top-level → applies to ALL targets + BOTH configs (the dev/prod bundle-id + App
# Group + entitlement split stays per-config in each target below).
settings:
  base:
    DEVELOPMENT_TEAM: 9W82X49JZS

targets:
  SkriftMobile:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Features
      - path: DesignSystem
      # Shared cross-app source (one physical copy → no phone↔Mac drift). Naming
      # types (Person/NamesMerge/NamesData) live here; engine + more land in Phase 0.
      # Export adds the shared Compiler + neutral CompilerInput DTO (standalone Phase 2).
      # Model adds the shared CloudKit @Models the Mac also adopts (MemoEnhancement; later
      # Memo/MemoAsset) — the Mac→CloudKit write-back (MAC_CLOUDKIT_PLAN.md).
      - path: ../Shared/Naming
      - path: ../Shared/Export
      - path: ../Shared/Model
      # Pipeline: pure parity algorithms both apps must run identically (vocab
      # parsing/trust, fusion, voice match, BPE merge, image markers).
      - path: ../Shared/Pipeline
      # Retrieval brain (P8): engine protocol + gist/chunker + index core — platform-neutral.
      - path: ../Shared/Retrieval
      # RetrievalEngine: the CoreML-LLM-bound GemmaEmbedder — APP targets only,
      # never test bundles (tests use MockEmbedder; the package link stays out).
      - path: ../Shared/RetrievalEngine
      # Session: the shared LockGate (per-device unlock state for locked notes).
      - path: ../Shared/Session
      # UI: shared SwiftUI helpers (FlowLayout — one copy across both apps + the extension).
      - path: ../Shared/UI
    info:
      path: App/Info.plist
      properties:
        # Resolved per-config (SKRIFT_DISPLAY_NAME): "Skrift Dev" in Debug, "Skrift"
        # in Release — so the dev + prod apps are distinguishable on the home screen.
        CFBundleDisplayName: $(SKRIFT_DISPLAY_NAME)
        # App Group id, readable at runtime (CaptureInbox) — same key as the share
        # extension's Info.plist, so both processes resolve the identical container.
        SkriftAppGroup: $(SKRIFT_APP_GROUP)
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "118"
        # Skrift is offline + uses only standard iOS crypto (on-device ASR, plain
        # local-network HTTP) → exempt from export compliance. Declaring this skips
        # the "Missing Compliance" prompt on every TestFlight/App Store build.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Skrift records audio to transcribe your speech. Recording only happens when you trigger it."
        NSCameraUsageDescription: "Skrift lets you snap photos while recording, placed into the transcript at the moment you took them."
        NSFaceIDUsageDescription: "Skrift uses Face ID to open your locked notes."
        NSLocationWhenInUseUsageDescription: "Skrift tags each memo with where you recorded it (place name, daylight, weather)."
        NSMotionUsageDescription: "Skrift records your step count alongside a memo for context."
        NSLocalNetworkUsageDescription: "Skrift finds your Mac on the local network to sync memos and names."
        NSBonjourServices:
          - _skrift._tcp
        # The Mac server is plain HTTP on the LAN; iOS blocks cleartext by
        # default. NSAllowsLocalNetworking permits it for local/.local/Bonjour
        # hosts only (no global ATS disable). Without this the upload/health/
        # names requests never leave the phone.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # iPhone stays portrait-only (the app's designed idiom); the iPad build
        # (universal wave 1, 2026-07-22) supports every orientation — split-view
        # IA + Stage Manager both expect free rotation on the pad.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: com.skrift.mobile
            CFBundleURLSchemes:
              - skrift
        # Live Activity (recording status on Lock Screen / Dynamic Island).
        NSSupportsLiveActivities: true
        # Keep the audio session + recording alive when backgrounded/locked so
        # the Live Activity stays meaningful.
        UIBackgroundModes:
          - audio
          - processing          # BGProcessingTask: continue a whole-book transcribe overnight
          - remote-notification # CloudKit silent push → sync in seconds, even backgrounded
        # Whole-book transcription can resume in the background (best overnight on a
        # charger). App-internal id (not the bundle id) so it's identical Debug/Release.
        BGTaskSchedulerPermittedIdentifiers:
          - com.skrift.booktranscribe
        # Share-to-import: appear in the Share Sheet / "Open in" for audio files
        # (WhatsApp / Voice Memos exports → a Skrift memo). iOS routes the file
        # URL through .onOpenURL → AppURLHandler → MemoSaver.importAudio.
        # LSHandlerRank=Alternate so we don't fight the OS default audio app.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Audio
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - public.mp3
              - public.mpeg-4-audio
              - com.microsoft.waveform-audio
              - public.aiff-audio
              # Broaden coverage — some apps (e.g. Signal) export voice notes with
              # a UTI that doesn't conform to public.audio (.opus / .aac / .m4a /
              # mp4-container). A true Share Extension is the robust catch-all
              # (lands with capture items); these add the common concrete types.
              - public.aac-audio
              - com.apple.m4a-audio
              - org.xiph.opus
              - public.mpeg-4
          # Share/Open-in a VIDEO (e.g. a self-recorded clip): Skrift strips the
          # audio + grabs one frame thumbnail, then transcribes on-device
          # (AppURLHandler → MemoSaver.importVideo). Alternate rank so we don't
          # fight the OS default video app.
          - CFBundleTypeName: Video
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.movie
              - public.video
              - public.mpeg-4
              - com.apple.quicktime-movie
        LSSupportsOpeningDocumentsInPlace: true
        # Photos picker (filtered to videos) reads a library asset's recording date.
        NSPhotoLibraryUsageDescription: "Skrift imports a video you pick, transcribing its audio and tagging the memo with when the video was recorded."
    settings:
      base:
        # Universal since 2026-07-22 (iPad wave 1): "1,2" = iPhone + iPad. The
        # iPad runs the SAME app with adaptive layouts — never a third target.
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        # App icon from App/Assets.xcassets (light + dark iOS-18 adaptive variants).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Dev/prod separation. Debug = "Skrift Dev" (com.skrift.mobile.dev) — its OWN
        # OS data container, so dev iteration NEVER touches the production app's
        # memos/recordings. Release = the real "Skrift". The widget + shared framework
        # bundle IDs follow (an app-extension id must be prefixed by its host's).
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev
          SKRIFT_DISPLAY_NAME: Skrift Dev
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev   # inverted-color dev icon
          # App Group: Debug resolves to the .dev group; Release to the prod group.
          # This single variable drives both the entitlement and the Info.plist key
          # (SkriftAppGroup) in both the app and the share extension — one place to flip.
          SKRIFT_APP_GROUP: group.com.skrift.mobile.dev
          # Literal per-config entitlements: a $(VAR) inside the .entitlements file
          # broke CLI automatic provisioning (profile matcher can't resolve it).
          CODE_SIGN_ENTITLEMENTS: App/SkriftMobile.dev.entitlements
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile
          SKRIFT_DISPLAY_NAME: Skrift
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
          SKRIFT_APP_GROUP: group.com.skrift.mobile
          CODE_SIGN_ENTITLEMENTS: App/SkriftMobile.entitlements
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: DSWaveformImage
        product: DSWaveformImageViews
      - package: Pow
        product: Pow
      - package: CoreMLLLM
        product: CoreMLLLM
      # Polish engine (iPad-gated at runtime; see the packages note above).
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - target: SkriftShared
        embed: true
      - target: SkriftWidget
        embed: true
      - target: SkriftShare
        embed: true

  # Shared framework: Live Activity ActivityAttributes (and, in 8b, the App
  # Intents) — visible to both the app and the widget extension.
  SkriftShared:
    type: framework
    platform: iOS
    sources:
      - path: SkriftShared
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "28"
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev.shared
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.shared

  # WidgetKit extension: the recording Live Activity (8a); Control Center +
  # Home/Lock widgets land in 8b.
  SkriftWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SkriftWidget
      # Multi-target source membership (Apple's iOS-18 pattern): the widget
      # compiles its own copy of the intents it triggers (Control Center Start,
      # Live Activity Stop). They reference only their static performer, so they
      # build here; the app sets the performer and openAppWhenRun routes the run
      # into the app process. SkriftShortcuts stays app-only (AppShortcutsProvider).
      - path: App/Intents/StartRecordingIntent.swift
      - path: App/Intents/StopRecordingIntent.swift
    info:
      path: SkriftWidget/Info.plist
      properties:
        CFBundleDisplayName: Skrift
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "118"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev.widget
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.widget
    dependencies:
      - target: SkriftShared
        embed: false

  # Share extension: save a URL / text / image into Skrift from any app.
  # The UI is hosted in a UIHostingController (ShareViewController.swift).
  # NO heavy package dependencies — the extension has a 120 MB memory ceiling;
  # FluidAudio/DSWaveformImage/Pow are deliberately excluded.
  SkriftShare:
    type: app-extension
    platform: iOS
    sources:
      - path: SkriftShare
      # Multi-target source membership: CaptureInbox is shared between the app
      # and the extension (both write/read the App Group container).
      - path: Services/Capture/CaptureInbox.swift
      # EXIF taken-date reader (A4) — the extension reads it BEFORE the
      # downsample re-encode strips metadata; the app's drainer parses it back.
      - path: Services/Capture/ImageDates.swift
      # SignificanceCircles + its dependencies (the SHARED SignificanceScale,
      # DesignSystem colors) are compiled directly into the extension so
      # it can render the significance control without importing the app target.
      - path: Features/MemoDetail/SignificanceCircles.swift
      - path: ../Shared/Model/SignificanceScale.swift
      # DesignSystem (Theme colours, Components) — no UIKit/AppKit-only API here,
      # so it builds cleanly in the extension process. Theme sources its cross-app
      # hex values from the shared Palette table.
      - path: ../Shared/UI/Palette.swift
      - path: DesignSystem/Theme.swift
      - path: DesignSystem/Components.swift
      - path: DesignSystem/Haptics.swift
      - path: ../Shared/UI/FlowLayout.swift
      # SharedContent + MemoMetadata types used by the share UI and CaptureInbox
      # (both are the shared C3/metadata schema — Shared/Model, one copy).
      - path: ../Shared/Model/MemoMetadata.swift
      - path: ../Shared/Model/SharedContent.swift
      # ISO8601 formatter (same UTC/fractional-seconds format as the Mac contract).
      - path: ../Shared/Model/ISO8601.swift
    info:
      path: SkriftShare/Info.plist
      properties:
        CFBundleDisplayName: $(SKRIFT_DISPLAY_NAME)
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "118"
        SkriftAppGroup: $(SKRIFT_APP_GROUP)
        # NO NSMicrophoneUsageDescription: iOS blocks recording in share
        # extensions at the entitlement level (mediaserverd refusal, device-
        # proven builds 60-62) — the sheet's dictation was removed 2026-07-10.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          # The activation rule MUST sit under NSExtensionAttributes — as a direct
          # NSExtension child iOS finds no rule and the extension never appears in
          # any share sheet (2026-06-12 device finding). No WebPageWithMaxCount
          # (implies a JS preprocessing file we don't ship; the URL item suffices).
          NSExtensionAttributes:
            # ACTIVATION RULE — a custom predicate STRING, not the dictionary form
            # (2026-07-11, Wave-2 device round). The dictionary keys each demand a
            # HOMOGENEOUS item (every attachment the same kind), so Safari sharing
            # a PDF page — ONE item carrying [web-URL + PDF] — matched no rule and
            # Skrift vanished from the sheet. The predicate accepts an item when
            # EVERY attachment conforms to at least one supported type (per-
            # attachment OR), up to 10 attachments (A11). public.data is the
            # catch-all documents leg (public.file-url covers file-backed items);
            # unclassifiable payloads still land in A16's honest "can't import".
            # History: WebURL 1 · Text · Image 10 · Movie 1 · File 10 (Wave 1).
            # xcodegen GENERATES the plist from here — never edit Info.plist direct.
            NSExtensionActivationRule: >-
              SUBQUERY(extensionItems, $extensionItem,
              SUBQUERY($extensionItem.attachments, $attachment,
              ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.url"
              OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.plain-text"
              OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.image"
              OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.movie"
              OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.audio"
              OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "com.adobe.pdf"
              OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.file-url"
              OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.data"
              ).@count == $extensionItem.attachments.@count
              AND $extensionItem.attachments.@count >= 1
              AND $extensionItem.attachments.@count <= 10
              ).@count >= 1
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.dev.share
          SKRIFT_APP_GROUP: group.com.skrift.mobile.dev
          CODE_SIGN_ENTITLEMENTS: SkriftShare/SkriftShare.dev.entitlements
          # A15: dev + prod both installed used to show two identical "Skrift"
          # rows in the share sheet — the dev extension now says "Skrift Dev".
          SKRIFT_DISPLAY_NAME: Skrift Dev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.share
          SKRIFT_APP_GROUP: group.com.skrift.mobile
          CODE_SIGN_ENTITLEMENTS: SkriftShare/SkriftShare.entitlements
          SKRIFT_DISPLAY_NAME: Skrift

  SkriftMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkriftMobileTests
    dependencies:
      - target: SkriftMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.unittests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

  SkriftMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SkriftMobileUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.uitests
        TEST_TARGET_NAME: SkriftMobile
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: SkriftMobile

schemes:
  SkriftMobile:
    build:
      targets:
        SkriftShared: all
        SkriftWidget: all
        SkriftShare: all
        SkriftMobile: all
        SkriftMobileTests: [test]
        SkriftMobileUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SkriftMobileTests
        - SkriftMobileUITests
