<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skrift</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #7c6bf5;
      margin-bottom: 32px;
    }
    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(124, 107, 245, 0.2);
      border-top-color: #7c6bf5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="logo">Skrift</div>
  <div class="spinner"></div>
  <div id="status">Starting backend…</div>
</body>
</html>
