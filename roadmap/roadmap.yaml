  - id: i1
    text: Export All button — one action that dumps everything to Markdown so a user
      can walk away from Skrift with all their data. The portability escape
      hatch (extends the Obsidian export path).
    source: voice
    nodeHint: P2
  - id: i2
    text: Auto-prune junk notes — delete memos left with no significance after 30
      days, but only after the user approves via a review notification;
      suppressed if the app hasn't been opened in a while (don't nuke a
      returning user's backlog). Differentiator for note-hygiene; needs a design
      pass in Claude Code before it earns a node.
    source: voice
  - id: i3
    text: Flattening the history nodes into a single straight Core lane makes the
      roadmap look weird — the move was committed then reverted. Leaving it
      as-is for now; the user will sort the layout out in Claude Code. (Just a
      note that this is a known thing, no action needed from Huginn.)
    source: voice
  - id: i8
    text: "Print-to-wall (Tuur, 2026-07-07): a note crossing INTO the orange
      importance tier (≥0.8) silently prints a designed card to the home
      printer (saved AirPrint printer + printToPrinter, no dialog) — the
      physical commonplace wall. Card = P6's quote-card renderer on paper;
      printedAt idempotency; Settings 'Wall printer' section; printed notes
      marked 🖨, later a Journal 'Wall' section mirrors the physical wall.
      Pairs with an 'Important lately' card on Journal home (P6's Highlights
      feed's first slot). Full design in backlog.md 🖨️ section."
    source: voice
    nodeHint: P6
  - id: i5
    text: "Anti-drift tail of SharedKit — 5 more phone↔Mac twin copies found in the
      dedup research, still not unified (each needs its own care, per backlog
      2026-07-07): (1) SpeakerTranscript twins — the shared Sanitiser parses
      conversations through a per-app SpeakerTranscript (desktop Diarizing.swift
      / mobile SpeakerTurnsView.swift); a change to one app's parser silently
      forks the shared Sanitiser. (2) MemoCloudIngest de-multipart — the Mac's
      only ingest path re-encodes the typed shared Memo into fake multipart for
      the retired Bonjour parser; map Memo+assets → PipelineFile directly/typed
      (golden parity test first). (3) NamesCloudSync reconcile core — both
      halves run the same fold→NamesMerge→byte-compare→collapse with different
      plumbing; encoder divergence → CloudKit churn loop. (4)
      VocabularyBooster.boost() cores — same spot→rescore→trust→apply flow,
      drifted. (5) Desktop legacy readers (PhoneMetadata + SharedContent) —
      lenient decoders to collapse once old payloads are gone. NOTE: this means
      SharedKit's win ('nothing the sync contract depends on exists twice')
      isn't strictly met."
    source: voice
    nodeHint: SharedKit
  - id: i6
    text: "Mac↔phone people/name-linking parity (both BIG, mock-first, from the
      2026-07-06 CloudKit test session). (1) The Mac's Names screen should match
      the phone's person UI — look + interaction parity. (2) Mac in-place
      name-linking should match the phone: on the phone a linkable word (e.g.
      'Will') shows dotted/tappable immediately on the RAW transcript; on the
      Mac the dotted suggestions only appear AFTER enhance (the sanitise pass)
      and aren't as interactive. Want immediate + tappable on the Mac too."
    source: voice
    nodeHint: P7
  - id: i7
    text: Books-tab branch — when it lands it needs to merge main and port its two
      fields (bookID / bookPosition) into Shared/Model/MemoMetadata.swift.
      Carry-forward loose end from the SharedKit dedup session; not urgent, but
      must not be forgotten at merge time.
