name: SkriftMobile
options:
  bundleIdPrefix: com.skrift
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  # Match Shhhcribble's pin (branch: main) so diarization/boosting APIs line up
  # with what was verified there — NOT the RN app's exactVersion 0.12.4.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
  # Live mic waveform (wired to the AVAudioEngine meters — no 2nd audio session).
  DSWaveformImage:
    url: https://github.com/dmrschmidt/DSWaveformImage.git
    from: "14.0.0"
  # Tasteful transitions, used sparingly.
  Pow:
    url: https://github.com/EmergeTools/Pow.git
    from: "1.0.0"

targets:
  SkriftMobile:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Features
      - path: DesignSystem
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Skrift
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Skrift records audio to transcribe your speech. Recording only happens when you trigger it."
        NSCameraUsageDescription: "Skrift lets you snap photos while recording, placed into the transcript at the moment you took them."
        NSLocationWhenInUseUsageDescription: "Skrift tags each memo with where you recorded it (place name, daylight, weather)."
        NSMotionUsageDescription: "Skrift records your step count alongside a memo for context."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.skrift.mobile
            CFBundleURLSchemes:
              - skrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: DSWaveformImage
        product: DSWaveformImageViews
      - package: Pow
        product: Pow

  SkriftMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkriftMobileTests
    dependencies:
      - target: SkriftMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.unittests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

  SkriftMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SkriftMobileUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skrift.mobile.uitests
        TEST_TARGET_NAME: SkriftMobile
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: SkriftMobile

schemes:
  SkriftMobile:
    build:
      targets:
        SkriftMobile: all
        SkriftMobileTests: [test]
        SkriftMobileUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SkriftMobileTests
        - SkriftMobileUITests
